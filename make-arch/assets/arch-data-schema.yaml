# ═══════════════════════════════════════════════════════════════════
# arch-data.yaml — SCHEMA v1.0   (make-arch)
# The derived machine companion to the architecture Markdown.
#
# GENERATED FILE. make-arch compiles this from architecture.md + the ADR
# files on every run. Never hand-edit. If this file and the markdown
# disagree, the markdown wins and this file is regenerated and re-stamped.
# scripts/validate_arch.py enforces rules A-001 .. A-008 and fails on any
# violation.
#
# The architecture layer is the slow-changing HOW. It is two things:
#   architecture.md / arch-data.yaml     — a thin C4/arc42-lite overview
#                                           (stack, components, integrations)
#                                           + MERMAID diagrams
#   decisions/ADR-NNNN-<slug>.md          — an APPEND-ONLY log, one file per
#                                           decision (Nygard ADR: Status /
#                                           Context / Decision / Consequences
#                                           + rejected alternatives)
#
# THE DOCTRINE:
#   - ADRs are immutable once accepted. You never EDIT a decision; you add
#     a NEW ADR that SUPERSEDES it (status: superseded, superseded_by set).
#     This is why the architecture layer stays in sync: each decision is a
#     frozen point-in-time record.
#   - Recommend-then-refine: make-arch proposes a stack, but every choice
#     carries a TYPED confidence — `known` (backed by a stated requirement,
#     constraint, or client fact) or `assumption` (the agent's default,
#     pending human confirmation). Assumption-backed choices surface a badge
#     so a human architects against them deliberately.
#   - Architecture serves features. A feature requirement that an ADR
#     governs links to it via `governed_by: [ADR-NNNN]` (in the make-spec
#     feature data file). no-orphan (A-004) keeps the two in agreement.
#
# Conventions: ADR ids are ^ADR-\d{4}$, globally unique, never reused or
# deleted (A-008, append-only). Every choice has a `confidence`. Empty lists
# are present, not omitted.
# ═══════════════════════════════════════════════════════════════════

meta:
  doc_type: spec-arch
  schema_version: "1.0"
  project_id: ""
  project_name: ""
  arch_version: ""               # first 12 hex of the fingerprint (OUT)
  status: draft                  # draft | review | approved
  generated_at: ""               # ISO 8601 — OUT of the fingerprint
  fingerprint: ""                # sha256 over contract content (A-007)

# One-paragraph system context (the C4 level-1 story; the diagram is in md).
context: ""

# C4 containers / components. Each carries a typed confidence and, when an
# ADR decides its technology, a governed_by link.
components:
  - id: "C-001"
    name: ""
    responsibility: ""
    tech: ""
    confidence: assumption       # known | assumption
    governed_by: []              # ADR ids

# External integrations (the C4 system-context edges).
integrations:
  - name: ""
    external_system: ""
    direction: outbound          # inbound | outbound | bidirectional
    data: ""
    confidence: assumption
    governed_by: []

# The ADR INDEX. The full prose lives in decisions/ADR-NNNN-<slug>.md; this
# index is what the validator and downstream tools read.
decisions:
  - id: "ADR-0001"
    title: ""
    status: accepted             # proposed | accepted | superseded | deprecated
    scope: feature               # feature | project
                                 #   feature-scoped ADRs must be referenced by
                                 #   >=1 feature requirement's governed_by (A-004)
                                 #   project-scoped ADRs are exempt (warn if unref)
    superseded_by: ""            # required when status is superseded; an ADR id
    confidence: known            # known | assumption
    governs: []                  # informational: requirement ids / feature slugs

# Which mermaid diagram kinds architecture.md is expected to carry (A-006).
diagrams:
  - context                      # required: the level-1 system context
  # - container                  # optional: C4 level-2
  # - sequence                   # optional: a key workflow
  # - erd                        # optional: the data model

# ═══════════════════════════════════════════════════════════════════
# FINGERPRINT IN/OUT CONTRACT (A-007)
#   OUT (advisory / derived — do NOT flip the fingerprint):
#       meta.fingerprint, meta.generated_at, meta.arch_version, notes
#   IN  (everything else is contract content): context, components,
#       integrations, decisions (incl. status + confidence + governed_by),
#       diagrams. Normalization is identical to make-spec: deep-copy, drop
#       the OUT keys everywhere, yaml.safe_dump(sort_keys=True), sha256.
# ═══════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════
# VALIDATOR RULES — run fails (exit 1) on any violation.
# Run: python scripts/validate_arch.py [docs/specs] [--baseline-ref origin/main | --no-baseline]
#
#   A-001  Well-formed: required meta fields + top-level keys present
#   A-002  Every decisions[].id matches ^ADR-\d{4}$, is unique, and has a
#          matching file decisions/ADR-NNNN-*.md (and vice versa)
#   A-003  Supersede discipline: status in
#          {proposed,accepted,superseded,deprecated}; a superseded ADR has a
#          superseded_by that resolves to another existing ADR (not itself).
#          ADRs are edited by SUPERSEDING, never in place.
#   A-004  no-orphan: every accepted feature-scoped ADR is referenced by >=1
#          feature requirement's governed_by; every governed_by an feature
#          cites resolves to an ADR here (project-scoped unreferenced -> warn)
#   A-005  Typed confidence: every component, integration, and decision has a
#          confidence in {known, assumption}
#   A-006  Diagrams: architecture.md exists and contains a ```mermaid block
#          for every kind listed in `diagrams` (at least the context diagram)
#   A-007  meta.fingerprint matches a recompute over contract content — FAILS
#          CLOSED (the gate that blocks internal drift)
#   A-008  Append-only: no ADR id present at the baseline (origin/main) is
#          missing now. FAILS CLOSED when the baseline can't be trusted
#          (no repo / shallow / unresolvable ref); --no-baseline only for the
#          greenfield first commit
# ═══════════════════════════════════════════════════════════════════
