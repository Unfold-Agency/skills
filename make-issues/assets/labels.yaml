# ═══════════════════════════════════════════════════════════════════
# labels.yaml -- the make-issues label scheme + meta-block contract
#
# Labels carry ONLY what a human filters and scans by -- provenance,
# autonomy, and the reconciliation flags. The meta block embedded in each
# issue body (see issue-body-template.md) is the AUTHORITATIVE machine
# record for everything else; the meta block wins if they ever disagree.
#
# scripts/gh_preflight.py ensures these labels exist on every run
# (create-if-missing, idempotent, `gh label create --force`). The whole
# scheme is the small static set below -- there are no per-run dynamic
# labels.
#
# Three things deliberately do NOT get labels, because labels are a scarce,
# human-facing, repo-global namespace and these are neither scarce nor for
# humans:
#   - Traceability. Per-ID `trace:<ID>` labels flooded the namespace (one
#     per requirement and ADR, all sharing one description) and drowned the
#     actionable labels on every card. The human-readable copy lives in the
#     issue body's `## Traceability` table; the machine copy is the meta
#     block's trace_req / trace_adr.
#   - Source version. A `src:<v>` stamp lives in the meta block's
#     source_version (the feature_version the issue was born from). do-work
#     reads it from there (not a label) to decide when a /make-issues sync is
#     owed.
#   - Implementation phase. When the overview authors an OPTIONAL `phasing`
#     plan, the phase an issue belongs to is carried by a GitHub MILESTONE
#     ("Phase <N>: <name>"), one per phase (see scripts/phase_milestones.py)
#     -- native, filterable, and shown on the card. It is NOT a label and NOT
#     in the meta block: phase is sequencing, not contract, so it stays out of
#     the fingerprint-keyed regions and is re-asserted on the milestone each
#     sync. do-work --phase=N reads it from the milestone. A project with no
#     phasing plan has no milestones at all.
#
# GitHub label names may contain `:` and `.`, so the prefixed forms below
# are valid label names as written.
# ═══════════════════════════════════════════════════════════════════

# ── Static labels (always ensured) ──────────────────────────────────
static:
  # Provenance -- the discriminator for "is this a make-issues issue?".
  # Mode selection and every reconciliation query filters on this.
  - name: make-issues
    color: "ededed"              # grey
    description: "Managed by the make-issues skill. Do not hand-edit managed regions."

  # Provenance mode -- how the issue traces to the spec set. The meta block's
  # `provenance` field is authoritative; this label is the human-scannable copy.
  # A spec-provenance issue projects a specific requirement (trace_req >= 1) and
  # is fingerprint-reconciled. An `amendment` issue was added on demand (a "quick
  # amendment, not a rewrite") and anchors to an existing feature/goal/ADR rather
  # than a requirement; the reconciler leaves its body alone (human-owned) and
  # never orphan-closes or refactors it -- it only checks the anchor still exists
  # and can PROMOTE it to a spec issue once a requirement covers it. There is no
  # `spec` label: a make-issues issue WITHOUT the amendment label is spec
  # provenance (the default), so existing issues need no migration.
  - name: amendment
    color: "1d76db"             # blue
    description: "Added on demand and anchored to the spec set (not a requirement projection). Body is human-owned; reconcile never clobbers or orphan-closes it."

  # Autonomy -- the signal the overnight loop reads to decide what it can
  # do unattended. Exactly one per issue. afk REQUIRES checkable acceptance
  # criteria (do-work refuses to auto-build an issue with none, regardless of
  # this label); an amendment with no authored criteria must be hitl.
  - name: afk
    color: "0e8a16"              # green
    description: "Away-from-keyboard: an agent may complete this unattended."
  - name: hitl
    color: "fbca04"              # amber
    description: "Human-in-the-loop: needs a human decision or review."

  # Reconciliation flags -- applied by Sync, cleared by humans.
  - name: needs-rebase
    color: "d93f0b"              # red-orange
    description: "The spec changed while this issue was being worked. Re-check the requirement."
  - name: spec-drift
    color: "d93f0b"
    description: "The spec changed and a human must reconcile this in-flight/HITL item."
  - name: orphaned
    color: "5319e7"              # deep purple
    description: "The requirement behind this issue was removed or superseded in the specs."

  # Refactor -- opened when a MODIFIED/REMOVED requirement (or a superseded
  # governing ADR) lands on already-shipped work. A refactor backs out or
  # reworks merged code, so it is always HITL.
  - name: refactor
    color: "b60205"              # deep red
    description: "Reworks shipped work after a spec/ADR change to a completed requirement. HITL."
  - name: refactor-tracking
    color: "c5def5"              # pale blue
    description: "Overflow tracker: refactors deferred past the --max-refactors fan-out cap; a human triages."

# ═══════════════════════════════════════════════════════════════════
# META-BLOCK CONTRACT
# The YAML between <!-- make-issues:meta --> and <!-- /make-issues:meta -->
# in every managed issue body. This is what an automation or the overnight
# loop parses; the reconciler reads `fingerprint` and `trace_req`, and do-work
# reads `source_version` (the version stamp that used to be a src: label).
#
#   provenance:      spec | amendment      # how it traces; absent == spec (default)
#   trace_req:       [<requirement ids>]   # ^(FR|IR|NFR|CR)-[A-Z]{2,5}-\d{3,}$;
#                                          #   spec: >=1 required. amendment: may be []
#   trace_adr:       [<ADR ids>]           # governing ADRs, from the requirement's
#                                          # governed_by; may be empty
#   feature:         <slug>                # the feature this requirement/anchor lives in
#   source_version:  "<feature_version>"   # the feature_version at birth ("" for amendment)
#   autonomy:        afk | hitl            # afk REQUIRES acceptance criteria
#   fingerprint:     "<sha256>"            # per-requirement hash; "" for amendment (no requirement)
#
# Rules:
#   - Every managed issue has a meta block. A spec issue carries all fields; an
#     amendment carries provenance: amendment and a resolvable `feature` anchor,
#     may have an empty trace_req, and has no requirement fingerprint.
#   - provenance is the FIRST discriminant the reconciler reads (absent == spec,
#     so pre-existing issues are unaffected). An amendment is never orphan-closed
#     or refactored; the reconciler only checks its feature anchor still exists.
#   - For a spec issue, trace_req is the primary match key (issue <-> requirement).
#     A malformed block is NOT auto-recovered (the reconciler does not parse the
#     prose body); scripts/analyze.py treats it as BLOCKING drift and the gate
#     fails -- a human reads the requirement id from the body's `## Traceability`
#     table and re-stamps the block, then re-runs. A spec issue with an empty/
#     string trace_req is blocking drift; an amendment with no `feature` anchor is
#     blocking drift.
#   - fingerprint is compared against the live per-requirement hash to
#     detect drift; on change, reconciliation acts by issue state (see analyze.py
#     and references/reconciliation.md). Amendments skip this comparison.
# ═══════════════════════════════════════════════════════════════════
