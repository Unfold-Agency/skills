# ═══════════════════════════════════════════════════════════════════
# labels.yaml — the make-issues label scheme + meta-block contract
#
# Labels carry ONLY what a human filters and scans by -- provenance,
# autonomy, and the reconciliation flags. The meta block embedded in each
# issue body (see issue-body-template.md) is the AUTHORITATIVE machine
# record for everything else; the meta block wins if they ever disagree.
#
# scripts/gh_preflight.py ensures these labels exist on every run
# (create-if-missing, idempotent, `gh label create --force`). The whole
# scheme is the small static set below -- there are no per-run dynamic
# labels.
#
# Two things deliberately do NOT get labels, because labels are a scarce,
# human-facing, repo-global namespace and these are neither scarce nor for
# humans:
#   - Traceability. Per-ID `trace:<ID>` labels flooded the namespace (one
#     per PRD requirement and TDD capability, all sharing one description)
#     and drowned the actionable labels on every card. The human-readable
#     copy lives in the issue body's `## Traceability` table; the machine
#     copy is the meta block's trace_tdd / trace_prd.
#   - Source versions. `src:prd-<v>` / `src:tdd-<v>` stamps live in the meta
#     block's source_versions. do-work reads source_versions.tdd from there
#     (not a label) to decide when a /make-issues sync is owed.
#
# GitHub label names may contain `:` and `.`, so the prefixed forms below
# are valid label names as written.
# ═══════════════════════════════════════════════════════════════════

# ── Static labels (always ensured) ──────────────────────────────────
static:
  # Provenance — the discriminator for "is this a make-issues issue?".
  # Mode selection and every reconciliation query filters on this.
  - name: make-issues
    color: "ededed"              # grey
    description: "Managed by the make-issues skill. Do not hand-edit managed regions."

  # Autonomy — the signal the overnight loop reads to decide what it can
  # do unattended. Exactly one per issue.
  - name: afk
    color: "0e8a16"              # green
    description: "Away-from-keyboard: an agent may complete this unattended."
  - name: hitl
    color: "fbca04"              # amber
    description: "Human-in-the-loop: needs a human decision or review."

  # Reconciliation flags — applied by Sync, cleared by humans.
  - name: needs-rebase
    color: "d93f0b"              # red-orange
    description: "The TDD changed while this issue was being worked. Re-check the spec."
  - name: spec-drift
    color: "d93f0b"
    description: "The TDD changed and a human must reconcile this in-flight/HITL item."
  - name: orphaned
    color: "5319e7"              # deep purple
    description: "The TDD capability behind this issue was removed or superseded."

# ═══════════════════════════════════════════════════════════════════
# META-BLOCK CONTRACT
# The YAML between <!-- make-issues:meta --> and <!-- /make-issues:meta -->
# in every managed issue body. This is what an automation or the overnight
# loop parses; the reconciler reads `fingerprint` and `trace_tdd`, and do-work
# reads `source_versions.tdd` (the version stamp that used to be a src: label).
#
#   trace_tdd:        [<capability IDs>]   # ENT/WF/STM/INTG/TNF/ADR; >=1, required
#   trace_prd:        [<PRD requirement IDs>]   # what the capability links to (its
#                                               # satisfies / PRD-side derived_from); may be empty
#   source_versions:  { prd: "<v>", tdd: "<v>" }   # the locked versions at birth
#   autonomy:         afk | hitl
#   fingerprint:      "<sha256>"           # from scripts/item_fingerprint.py
#
# Rules:
#   - Every managed issue has a meta block with all five keys.
#   - trace_tdd is the primary match key (issue <-> TDD capability). A malformed
#     block is NOT auto-recovered (the reconciler does not parse the prose body);
#     it is flagged for a human, who reads the capability ID from the body's
#     `## Traceability` table and re-stamps the block.
#   - fingerprint is compared against the live per-capability hash to
#     detect drift; on change, reconciliation acts by issue state.
# ═══════════════════════════════════════════════════════════════════
