# ═══════════════════════════════════════════════════════════════════
# prd-data.yaml — SCHEMA v1.0
# Derived machine companion to the PRD Markdown (template v1.1)
#
# GENERATED FILE. The Skill compiles this from the PRD markdown
# (master + shards) on every version bump. Never hand-edit. If this
# file and the markdown disagree, the markdown wins and this file is
# regenerated. The validator enforces the rules listed at the bottom
# (V-001 .. V-016) and fails the build on any violation.
#
# Consumers:
#   - Lane 3 (solution modeling): objectives, requirements, constraints
#   - Lane 4 (issue generation): requirements + acceptance_criteria
#   - Lane 6 (AI execution): requirement lookups by ID, escalations
#   - Lane 7 (UAT): objectives.success_criteria → UAT scripts
#   - Validator: everything
#
# Conventions:
#   - All IDs are strings, globally unique, never reused or renumbered
#   - Every ID'd item has `status`: active | superseded | deferred
#   - Every ID'd item has `sources`: list of {handle, locator}
#     where handle references source_index and locator is a timestamp,
#     section, page, or board-node reference
#   - Empty lists are present, not omitted (consumers shouldn't
#     null-check shape)
# ═══════════════════════════════════════════════════════════════════

