# ═══════════════════════════════════════════════════════════════════
# ESCALATIONS — the formal path from Lane 6 back to the PRD.
#
# THE RULE (every AI agent and engineer operates under this):
# If you cannot satisfy an acceptance criterion AS WRITTEN — or you
# discover a missing requirement, an ambiguity, or a constraint
# conflict — you do NOT patch around it, reinterpret it, or silently
# narrow it. You raise an escalation record and pause that ticket.
# A named human validates every escalation. AI agents may RAISE and
# PROPOSE; only humans DECIDE.
#
# Lifecycle:
#   raised (agent or human, ticket pauses)
#     → validated (human confirms it's real, classifies it)
#       → decided: one of
#           refine-ticket    (ticket-level fix, PRD untouched)
#           minor-amendment  (PRD x.Y bump, Section 1.2)
#           major-amendment  (PRD X.0 bump → full 1.3 propagation)
#           rejected         (criterion stands as written; ticket
#                             resumes with guidance)
#     → closed (decision executed; if amendment, change_log entry
#               references this ESC id)
# ═══════════════════════════════════════════════════════════════════
escalations:
  - id: "ESC-001"
    raised_by: ""                # agent id or person
    raised_by_type: ai-agent     # ai-agent | engineer | designer | qa | pm
    ticket: ""                   # paused ticket ID
    date_raised: ""
    type: cannot-satisfy-ac      # cannot-satisfy-ac | ambiguity |
                                 # missing-requirement |
                                 # constraint-conflict | scope-gap
    affected_ids: []             # PRD IDs in question (required)
    description: ""              # what was attempted / what's unclear
    proposed_resolution: ""      # raiser's suggestion (non-binding)
    proposed_change_class: refine-ticket
    validator: ""                # named human (required before decision)
    decision: ""                 # refine-ticket | minor-amendment |
                                 # major-amendment | rejected
    decision_rationale: ""
    date_decided: ""
    resulting_prd_version: ""    # filled when decision is an amendment
    status: raised               # raised | validated | decided | closed

# ═══════════════════════════════════════════════════════════════════
# VALIDATOR RULES — build fails on any violation
#
# Integrity
#   V-001  meta.prd_version equals the markdown frontmatter version
#   V-002  Every ID matches ^(BO|UO|FR|CR|IR|NFR|CON|AS|KU|DEP|RSK|ER|ESC)-\d{3,}$
#   V-003  No duplicate IDs anywhere in the document
#   V-004  Every ID referenced (supports, depends_on, blocks, affected_ids,
#          changed_ids, open_items, derived_from) exists in the document
#   V-005  No ID present in a prior version is missing now — items are
#          superseded or deferred, never deleted
#
# Completeness
#   V-006  Every active FR has ≥1 acceptance criterion, and ≥1 with
#          path: failure or edge
#   V-007  Every active objective has ≥1 success criterion with a
#          measurement_method
#   V-008  Every active ID'd item has ≥1 source, OR is referenced by an
#          open KU- item
#   V-009  Every source handle resolves to a source_index entry
#   V-010  Every FR feature_area matches a scope.in_scope entry
#
# Status gates
#   V-011  prd_status: approved requires zero conflicts with status: open
#   V-012  prd_status: approved requires zero escalations in raised or
#          validated state
#   V-013  Every change_log entry with change_class: major has ≥1 approval
#   V-014  Every escalation with a decision has a named validator
#   V-015  Every change_log entry triggered_by.type: escalation references
#          an ESC- id with status: closed or decided
#   V-016  Baseline "" in a success criterion requires baseline_ku to
#          reference an open or answered KU- item
# ═══════════════════════════════════════════════════════════════════