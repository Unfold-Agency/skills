<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Traceability Map</title>
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --panel-2: #1c2330;
        --border: #30363d;
        --border-soft: #21262d;
        --text: #e6edf3;
        --muted: #8b949e;
        --wire: #30363d;
        --wire-hl: #e6edf3;
        --todo: #6e7681;
        --doing: #1f6feb;
        --done: #238636;
        --dropped: #6e40c9;
        --none: #373e47;
        --deleted: #b62324;
        --chip-bg: #21262d;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font:
          13px/1.4 -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
      }

      header {
        flex: 0 0 auto;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px 18px;
      }
      header h1 {
        font-size: 15px;
        margin: 0;
        font-weight: 650;
      }
      header h1 small {
        color: var(--muted);
        font-weight: 400;
        font-size: 12px;
        margin-left: 8px;
      }

      .totals {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        align-items: center;
      }
      .stat {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--panel-2);
        border: 1px solid var(--border-soft);
        border-radius: 999px;
        padding: 3px 10px;
        font-size: 12px;
      }
      .stat b {
        font-weight: 650;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        display: inline-block;
      }
      .dot.todo {
        background: var(--todo);
      }
      .dot.doing {
        background: var(--doing);
      }
      .dot.done {
        background: var(--done);
      }
      .dot.dropped {
        background: var(--dropped);
      }
      .dot.none {
        background: var(--none);
      }
      .dot.deleted {
        background: var(--deleted);
      }

      .controls {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-left: auto;
        flex-wrap: wrap;
      }
      .controls label {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
        user-select: none;
      }
      .controls input[type='search'] {
        background: var(--panel-2);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 6px;
        padding: 5px 9px;
        width: 190px;
        font-size: 12px;
      }
      button.btn {
        background: var(--panel-2);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 6px;
        padding: 5px 10px;
        font-size: 12px;
        cursor: pointer;
      }
      button.btn:hover {
        border-color: var(--muted);
      }

      #viewport {
        flex: 1 1 auto;
        overflow: auto;
        position: relative;
      }
      #canvas {
        position: relative;
        display: inline-block;
        min-width: 100%;
        padding: 18px 24px 60px;
      }
      #wires {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        overflow: visible;
      }
      #wires path {
        fill: none;
        stroke: var(--wire);
        stroke-width: 1.1;
        opacity: 0.3;
        transition:
          opacity 0.12s,
          stroke 0.12s;
      }
      #wires path.hl {
        stroke: var(--wire-hl);
        stroke-width: 1.8;
        opacity: 1;
      }
      #wires path.dim {
        opacity: 0.04;
      }
      #wires path.deleted-wire {
        stroke: var(--deleted);
        stroke-dasharray: 3 3;
      }

      #columns {
        position: relative;
        z-index: 2;
        display: flex;
        gap: 64px;
        align-items: flex-start;
      }
      .col {
        width: 250px;
        flex: 0 0 250px;
      }
      .col.col-arch {
        width: 270px;
        flex: 0 0 270px;
      }
      .col-head {
        position: sticky;
        top: 0;
        z-index: 3;
        font-weight: 650;
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 4px 2px 8px;
        background: linear-gradient(var(--bg) 70%, transparent);
      }
      .group {
        margin-bottom: 10px;
      }
      .group-head {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--muted);
        font-weight: 600;
        padding: 4px 6px;
        border-radius: 6px;
        cursor: default;
      }
      .group.collapsible .group-head {
        cursor: pointer;
      }
      .group.collapsible .group-head:hover {
        background: var(--panel-2);
      }
      .group-head .caret {
        width: 10px;
        display: inline-block;
        transition: transform 0.1s;
      }
      .group.collapsed .group-head .caret {
        transform: rotate(-90deg);
      }
      .group.collapsed .group-body {
        display: none;
      }
      .group-count {
        margin-left: auto;
        font-variant-numeric: tabular-nums;
      }

      .node {
        position: relative;
        background: var(--panel);
        border: 1px solid var(--border);
        border-left-width: 3px;
        border-radius: 7px;
        padding: 6px 8px;
        margin: 6px 0;
        cursor: pointer;
        transition:
          box-shadow 0.12s,
          opacity 0.12s,
          border-color 0.12s,
          transform 0.06s;
      }
      .node:hover {
        border-color: var(--muted);
      }
      .node.status-todo {
        border-left-color: var(--todo);
      }
      .node.status-doing {
        border-left-color: var(--doing);
      }
      .node.status-done {
        border-left-color: var(--done);
      }
      .node.status-dropped {
        border-left-color: var(--dropped);
      }
      .node.status-none {
        border-left-color: var(--none);
      }
      .node.dim-node {
        opacity: 0.45;
      } /* superseded / deferred spec item */
      .node.deleted-node {
        border-left-color: var(--deleted) !important;
        border-left-style: dashed;
        background: repeating-linear-gradient(
          -45deg,
          var(--panel),
          var(--panel) 8px,
          #1a1113 8px,
          #1a1113 10px
        );
      }
      .node.deleted-node .node-title {
        text-decoration: line-through;
        color: var(--muted);
      }
      .node.faded {
        opacity: 0.12;
      } /* not in highlighted chain */
      .node.filtered {
        display: none;
      }
      .node.pinned,
      .node.active {
        box-shadow: 0 0 0 2px var(--wire-hl);
      }
      .node.match {
        outline: 2px solid #d29922;
        outline-offset: 1px;
      }

      .node-head {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .chip {
        font:
          600 10.5px/1 ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
        background: var(--chip-bg);
        color: var(--muted);
        border-radius: 4px;
        padding: 3px 5px;
        white-space: nowrap;
      }
      .chip.link {
        color: #58a6ff;
        text-decoration: none;
      }
      .chip.link:hover {
        text-decoration: underline;
      }
      .kind {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .pct {
        margin-left: auto;
        font-size: 10.5px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .node-title {
        margin-top: 3px;
        font-size: 12px;
        color: var(--text);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .bar {
        height: 4px;
        border-radius: 3px;
        background: var(--panel-2);
        margin-top: 6px;
        overflow: hidden;
      }
      .bar > i {
        display: block;
        height: 100%;
        border-radius: 3px;
      }
      .bar.c-todo > i {
        background: var(--todo);
      }
      .bar.c-doing > i {
        background: var(--doing);
      }
      .bar.c-done > i {
        background: var(--done);
      }
      .bar.c-none > i {
        background: transparent;
      }
      .subrow {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-top: 5px;
        flex-wrap: wrap;
      }
      .count {
        font-size: 10.5px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .badge {
        font-size: 9.5px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        border-radius: 4px;
        padding: 2px 5px;
        background: #341a00;
        color: #f0883e;
        border: 1px solid #5a3410;
      }
      .badge.del {
        background: #2d0f10;
        color: #ff7b72;
        border-color: #6e2325;
      }
      .empty-note {
        color: var(--muted);
        font-size: 11px;
        padding: 4px 6px;
      }
      footer {
        flex: 0 0 auto;
        padding: 6px 16px;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Traceability Map <small id="versions"></small></h1>
      <div class="totals" id="totals"></div>
      <div class="controls">
        <label
          ><input type="checkbox" class="fstatus" value="todo" checked />
          <span class="dot todo"></span> Not started</label
        >
        <label
          ><input type="checkbox" class="fstatus" value="doing" checked />
          <span class="dot doing"></span> In progress</label
        >
        <label
          ><input type="checkbox" class="fstatus" value="done" checked />
          <span class="dot done"></span> Done</label
        >
        <label
          ><input type="checkbox" class="fstatus" value="dropped" checked />
          <span class="dot dropped"></span> Dropped</label
        >
        <label
          ><input type="checkbox" id="show-deleted" checked />
          <span class="dot deleted"></span> Deleted</label
        >
        <input type="search" id="search" placeholder="Filter by ID or text…" />
        <button class="btn" id="toggle-arch">Collapse architecture</button>
        <button class="btn" id="reset">Reset</button>
      </div>
    </header>

    <div id="viewport">
      <div id="canvas">
        <svg id="wires" xmlns="http://www.w3.org/2000/svg"></svg>
        <div id="columns"></div>
      </div>
    </div>

    <footer id="foot"></footer>

    <script>
      const DATA = __DATA__;
      const N = DATA.nodes;

      // ---- adjacency (both directions) ----------------------------------
      const up = new Map(); // child -> [parents]
      const down = new Map(); // parent -> [children]
      const push = (m, k, v) => {
        (m.get(k) || m.set(k, []).get(k)).push(v);
      };
      for (const { from, to } of DATA.edges) {
        push(up, from, to);
        push(down, to, from);
      }
      const isDeleted = (id) => N[id] && N[id].state === 'deleted';

      // ---- header -------------------------------------------------------
      const t = DATA.meta.totals;
      document.getElementById('versions').textContent =
        `Spec v${DATA.meta.projectVersion || '?'} · Arch v${DATA.meta.archVersion || '?'}`;
      document.getElementById('totals').innerHTML = [
        `<span class="stat"><b>${t.issues}</b> issues</span>`,
        `<span class="stat"><span class="dot done"></span><b>${t.done}</b> done</span>`,
        `<span class="stat"><span class="dot doing"></span><b>${t.doing}</b> in progress</span>`,
        `<span class="stat"><span class="dot todo"></span><b>${t.todo}</b> not started</span>`,
        t.dropped
          ? `<span class="stat"><span class="dot dropped"></span><b>${t.dropped}</b> dropped</span>`
          : '',
        `<span class="stat"><b>${t.untraced}</b> untraced</span>`,
        t.orphanedRefs
          ? `<span class="stat" title="issue trace IDs not found in the current spec"><b>${t.orphanedRefs}</b> orphaned refs</span>`
          : '',
        t.deleted
          ? `<span class="stat" title="nodes removed from the sources, kept as tombstones"><span class="dot deleted"></span><b>${t.deleted}</b> deleted</span>`
          : '',
      ]
        .filter(Boolean)
        .join('');
      const gen = DATA.meta.generatedAt ? new Date(DATA.meta.generatedAt) : null;
      document.getElementById('foot').textContent =
        `Generated ${gen ? gen.toLocaleString() : '?'} from docs/specs + live GitHub Issues` +
        (DATA.meta.repo ? ` · ${DATA.meta.repo}` : '') +
        ' · additive ledger (deleted nodes are kept as tombstones)';

      // ---- render nodes -------------------------------------------------
      const el = new Map(); // node id -> element
      const canvas = document.getElementById('canvas');
      const colsWrap = document.getElementById('columns');
      const svg = document.getElementById('wires');

      function nodeEl(id) {
        const n = N[id];
        const deleted = n.state === 'deleted';
        const d = document.createElement('div');
        d.className =
          `node status-${n.color || 'none'}` +
          (n.dim ? ' dim-node' : '') +
          (deleted ? ' deleted-node' : '');
        d.dataset.id = id;
        d.tabIndex = 0;
        d.title = n.full || n.title || id;

        const head = document.createElement('div');
        head.className = 'node-head';
        if (n.tier === 'issue') {
          const a = document.createElement('a');
          a.className = 'chip link';
          a.textContent = id;
          a.href = n.url || '#';
          a.target = '_blank';
          a.rel = 'noopener';
          head.appendChild(a);
        } else {
          const chip = document.createElement('span');
          chip.className = 'chip';
          chip.textContent = id;
          head.appendChild(chip);
          const pct = document.createElement('span');
          pct.className = 'pct';
          pct.textContent = n.counts && n.counts.total ? `${n.pct}%` : '—';
          head.appendChild(pct);
        }
        d.appendChild(head);

        const title = document.createElement('div');
        title.className = 'node-title';
        title.textContent = n.title || id;
        d.appendChild(title);

        if (n.tier !== 'issue') {
          const bar = document.createElement('div');
          bar.className = `bar c-${n.color || 'none'}`;
          const i = document.createElement('i');
          i.style.width = `${n.pct || 0}%`;
          bar.appendChild(i);
          d.appendChild(bar);
          const sub = document.createElement('div');
          sub.className = 'subrow';
          const c = document.createElement('span');
          c.className = 'count';
          c.textContent =
            n.counts && n.counts.total ? `${n.counts.done}/${n.counts.total} done` : 'no issues yet';
          sub.appendChild(c);
          if (deleted) sub.appendChild(delBadge());
          d.appendChild(sub);
        } else if ((n.badges && n.badges.length) || deleted) {
          const sub = document.createElement('div');
          sub.className = 'subrow';
          for (const b of n.badges || []) {
            const badge = document.createElement('span');
            badge.className = 'badge';
            badge.textContent = b;
            sub.appendChild(badge);
          }
          if (deleted) sub.appendChild(delBadge());
          d.appendChild(sub);
        }

        el.set(id, d);
        return d;
      }

      function delBadge() {
        const b = document.createElement('span');
        b.className = 'badge del';
        b.textContent = 'deleted';
        return b;
      }

      for (const col of DATA.columns) {
        const c = document.createElement('div');
        c.className = `col col-${col.key}`;
        const h = document.createElement('div');
        h.className = 'col-head';
        h.textContent = col.label;
        c.appendChild(h);

        for (const g of col.groups) {
          const gr = document.createElement('div');
          gr.className = 'group' + (g.collapsible ? ' collapsible' : '');
          gr.dataset.group = g.id;
          const gh = document.createElement('div');
          gh.className = 'group-head';
          gh.innerHTML =
            (g.collapsible ? '<span class="caret">▾</span>' : '') +
            `<span>${g.label}</span><span class="group-count">${g.nodeIds.length}</span>`;
          gr.appendChild(gh);
          const body = document.createElement('div');
          body.className = 'group-body';
          for (const id of g.nodeIds) body.appendChild(nodeEl(id));
          gr.appendChild(body);
          if (g.collapsible)
            gh.addEventListener('click', () => {
              gr.classList.toggle('collapsed');
              scheduleDraw();
            });
          c.appendChild(gr);
        }
        colsWrap.appendChild(c);
      }

      // ---- wires --------------------------------------------------------
      const visible = (id) => {
        const e = el.get(id);
        return e && !e.classList.contains('filtered') && e.offsetParent !== null;
      };
      let raf = 0;
      const scheduleDraw = () => {
        cancelAnimationFrame(raf);
        raf = requestAnimationFrame(drawEdges);
      };

      function drawEdges() {
        const cr = canvas.getBoundingClientRect();
        svg.setAttribute('width', canvas.offsetWidth);
        svg.setAttribute('height', canvas.offsetHeight);
        let out = '';
        let idx = 0;
        for (const { from, to } of DATA.edges) {
          if (!visible(from) || !visible(to)) continue;
          const rc = el.get(from).getBoundingClientRect(); // child (right)
          const rp = el.get(to).getBoundingClientRect(); // parent (left)
          const x2 = rc.left - cr.left,
            y2 = rc.top - cr.top + rc.height / 2; // child left edge
          const x1 = rp.right - cr.left,
            y1 = rp.top - cr.top + rp.height / 2; // parent right edge
          const cp = Math.max(40, (x2 - x1) / 2);
          const del = isDeleted(from) || isDeleted(to) ? ' class="deleted-wire"' : '';
          out += `<path data-i="${idx}"${del} data-from="${from}" data-to="${to}" d="M${x1} ${y1} C${x1 + cp} ${y1}, ${x2 - cp} ${y2}, ${x2} ${y2}"/>`;
          idx++;
        }
        svg.innerHTML = out;
      }

      // ---- highlight chain ---------------------------------------------
      function connected(id) {
        const set = new Set([id]);
        for (const map of [up, down]) {
          const stack = [id];
          while (stack.length) {
            const cur = stack.pop();
            for (const nb of map.get(cur) || [])
              if (!set.has(nb)) {
                set.add(nb);
                stack.push(nb);
              }
          }
        }
        return set;
      }
      function highlight(id) {
        const set = connected(id);
        for (const [nid, e] of el) e.classList.toggle('faded', !set.has(nid));
        for (const p of svg.querySelectorAll('path')) {
          const on = set.has(p.dataset.from) && set.has(p.dataset.to);
          p.classList.toggle('hl', on);
          p.classList.toggle('dim', !on);
        }
      }
      function clearHighlight() {
        for (const e of el.values()) e.classList.remove('faded', 'active');
        for (const p of svg.querySelectorAll('path')) p.classList.remove('hl', 'dim');
      }

      let pinned = null;
      colsWrap.addEventListener('mouseover', (e) => {
        const node = e.target.closest('.node');
        if (!node || pinned) return;
        node.classList.add('active');
        highlight(node.dataset.id);
      });
      colsWrap.addEventListener('mouseout', (e) => {
        const node = e.target.closest('.node');
        if (!node || pinned) return;
        node.classList.remove('active');
        clearHighlight();
      });
      colsWrap.addEventListener('click', (e) => {
        if (e.target.closest('a')) return; // let issue links through
        const node = e.target.closest('.node');
        if (!node) return;
        const id = node.dataset.id;
        if (pinned === id) {
          pinned = null;
          node.classList.remove('pinned');
          clearHighlight(); // also clears the lingering `active` on unpin
          return;
        }
        if (pinned) el.get(pinned)?.classList.remove('pinned');
        clearHighlight();
        pinned = id;
        node.classList.add('pinned', 'active');
        highlight(id);
      });

      // ---- filters ------------------------------------------------------
      function applyFilters() {
        const on = new Set([...document.querySelectorAll('.fstatus:checked')].map((c) => c.value));
        const showDeleted = document.getElementById('show-deleted').checked;
        for (const [id, e] of el) {
          const n = N[id];
          let hide = false;
          if (n.state === 'deleted' && !showDeleted) hide = true;
          if (n.tier === 'issue' && !on.has(n.status)) hide = true;
          e.classList.toggle('filtered', hide);
        }
        scheduleDraw();
      }
      for (const c of document.querySelectorAll('.fstatus'))
        c.addEventListener('change', applyFilters);
      document.getElementById('show-deleted').addEventListener('change', applyFilters);

      const search = document.getElementById('search');
      search.addEventListener('input', () => {
        const q = search.value.trim().toLowerCase();
        for (const [id, e] of el) {
          if (!q) {
            e.classList.remove('match');
            continue;
          }
          const n = N[id];
          const hit =
            id.toLowerCase().includes(q) || (n.full || n.title || '').toLowerCase().includes(q);
          e.classList.toggle('match', hit);
        }
      });

      let archCollapsed = false;
      document.getElementById('toggle-arch').addEventListener('click', (ev) => {
        archCollapsed = !archCollapsed;
        for (const gr of document.querySelectorAll('.col-arch .group.collapsible'))
          gr.classList.toggle('collapsed', archCollapsed);
        ev.target.textContent = archCollapsed ? 'Expand architecture' : 'Collapse architecture';
        scheduleDraw();
      });

      document.getElementById('reset').addEventListener('click', () => {
        pinned = null;
        search.value = '';
        for (const c of document.querySelectorAll('.fstatus')) c.checked = true;
        document.getElementById('show-deleted').checked = true;
        for (const e of el.values())
          e.classList.remove('filtered', 'match', 'pinned', 'active', 'faded');
        for (const gr of document.querySelectorAll('.group.collapsed'))
          gr.classList.remove('collapsed');
        archCollapsed = false;
        document.getElementById('toggle-arch').textContent = 'Collapse architecture';
        clearHighlight();
        scheduleDraw();
      });

      // ---- boot ---------------------------------------------------------
      let rz;
      window.addEventListener('resize', () => {
        clearTimeout(rz);
        rz = setTimeout(scheduleDraw, 120);
      });
      if (document.fonts && document.fonts.ready) document.fonts.ready.then(scheduleDraw);
      scheduleDraw();
    </script>
  </body>
</html>
